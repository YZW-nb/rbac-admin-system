# =============================================
# 开发环境配置
# =============================================
spring:
  config:
    activate.on-profile: dev

# 开发环境开启 SQL 日志（仅用于调试）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 开发环境开启详细日志
logging:
  level:
    root: info
    com.admin: debug
    com.admin.mapper: debug

# 开发环境开启 Knife4j 接口文档
knife4j:
  enable: true
  production: false

# 开发环境 CORS 允许所有来源
admin:
  cors:
    allowed-origins: "*"
