# =============================================
# 应用配置（主配置 - 敏感信息通过环境变量注入）
# =============================================
server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据源
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/admin_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: postgres
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Jackson 日期格式化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# =============================================
# MyBatis-Plus 配置
# =============================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.admin.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# =============================================
# PageHelper 分页
# =============================================
pagehelper:
  helper-dialect: postgresql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# =============================================
# Knife4j 接口文档
# =============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: false
  setting:
    language: zh_cn

# =============================================
# 日志配置（默认 info，开发环境由 profile 覆盖）
# =============================================
logging:
  level:
    root: info
    com.admin: info

# =============================================
# 应用自定义配置
# =============================================
admin:
  # JWT 配置 - 密钥必须通过环境变量注入
  jwt:
    secret: ${JWT_SECRET:please-set-jwt-secret-in-environment}
    access-token-expiration: 1800000    # 30分钟
    refresh-token-expiration: 604800000 # 7天
    header: Authorization
    prefix: "Bearer "

  # 文件上传配置
  upload:
    path: ./uploads/
    max-size: 10485760  # 10MB

  # 是否开启验证码
  captcha-enabled: true
